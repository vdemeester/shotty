version: 2

builds:
  - env:
      - CGO_ENABLED=0
    binary: shotty
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -w -s -X main.version={{.Version}}

archives:
  - name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

release:
  prerelease: "false"
